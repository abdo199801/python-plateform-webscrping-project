services:
  - type: web
    name: mapsscraper-api
    runtime: python
    plan: free
    healthCheckPath: /api/health
    buildCommand: pip install -r requirements.txt && PLAYWRIGHT_BROWSERS_PATH=0 python -m playwright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ENABLE_CELERY
        value: "false"
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: USER_JWT_SECRET
        sync: false
      - key: ADMIN_FULL_NAME
        value: Platform Administrator
      - key: ADMIN_IS_SUPERUSER
        value: "true"
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_ENVIRONMENT
        value: sandbox
      - key: PAYPAL_CURRENCY
        value: USD
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  - type: worker
    name: mapsscraper-worker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && PLAYWRIGHT_BROWSERS_PATH=0 python -m playwright install chromium
    startCommand: celery -A app.tasks worker --loglevel=info --pool=solo
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ENABLE_CELERY
        value: "true"
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: USER_JWT_SECRET
        sync: false
      - key: ADMIN_FULL_NAME
        value: Platform Administrator
      - key: ADMIN_IS_SUPERUSER
        value: "true"